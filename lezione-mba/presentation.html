<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents in action</title>

  <!-- Reveal.js core -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides-container">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script>
    const slideFiles = [
      'slides/slide0-title.html',
      'slides/slide1-llm-cuore.html',
      'slides/slide2bis-training-loop.html',
      'slides/slide2-pretraining.html',
      'slides/slide4-compression.html',
      'slides/slide3-conoscenza.html',
      'slides/slide5-conseguenze.html',
      'slides/slide7-genera-testo.html',
      'slides/slide6-context-window.html',
      'slides/slide8-pratica.html',
    ];

    Promise.all(
      slideFiles.map(file => fetch(file).then(r => r.text()))
    ).then(htmls => {
      const container = document.getElementById('slides-container');
      htmls.forEach(html => container.insertAdjacentHTML('beforeend', html));
      Reveal.initialize({
        width: 1280,
        height: 720,
        margin: 0,
        controls: true,
        progress: true,
        slideNumber: true,
        hash: true,
        transition: 'slide',
        center: false
      });
    });
  </script>
</body>
</html>

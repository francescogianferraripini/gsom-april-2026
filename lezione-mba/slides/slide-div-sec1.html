<!-- Section divider — Sezione 1: LLM -->
<section class="section-divider" data-state="is-section-divider">
  <p style="font-size: 11pt; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-color); margin-bottom: 10px;">Sezione 1 di 7</p>
  <h1 style="color: var(--primary-color); margin-bottom: 10px;">LLM</h1>
  <p style="font-size: 18pt; color: var(--muted-color); margin-bottom: 56px;">Il motore degli agenti</p>
  <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px; width: 90%; max-width: 1000px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <i class="fa-solid fa-microchip" style="font-size:26pt;color:var(--primary-color);"></i>
      <span style="font-size:10pt;color:var(--text-color);font-weight:600;text-align:center;">LLM</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-comments" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Conversazionale</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-lock" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Closed vs Open</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-wrench" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Tool</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-toolbox" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Tipi di tool</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-code" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Codice</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.25;">
      <i class="fa-solid fa-layer-group" style="font-size:20pt;color:var(--primary-color);"></i>
      <span style="font-size:9pt;color:var(--muted-color);text-align:center;">Context engineering</span>
    </div>
  </div>
</section>

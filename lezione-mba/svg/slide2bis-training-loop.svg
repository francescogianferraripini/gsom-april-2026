<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowStep" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8892a0"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#00b4d8"/>
    </marker>
    <marker id="arrowBack" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#00b4d8"/>
    </marker>
  </defs>

  <!-- ============ STEP 1: Frase dal corpus ============ -->
  <g transform="translate(30, 40)">
    <text x="70" y="0" fill="#8892a0" font-size="11" text-anchor="middle" font-weight="600">1. Frase dal corpus</text>
    <rect x="0" y="10" width="140" height="55" rx="6" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1.5"/>
    <text x="70" y="33" fill="#e8e8e8" font-size="11" text-anchor="middle" font-style="italic">"Il gatto è sul</text>
    <text x="70" y="50" fill="#e8e8e8" font-size="11" text-anchor="middle" font-style="italic">tavolo"</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="175" y1="75" x2="205" y2="75" stroke="#8892a0" stroke-width="1.5" marker-end="url(#arrowStep)"/>

  <!-- ============ STEP 2: Maschera ultima parola ============ -->
  <g transform="translate(215, 40)">
    <text x="75" y="0" fill="#8892a0" font-size="11" text-anchor="middle" font-weight="600">2. Maschera ultima parola</text>
    <rect x="0" y="10" width="150" height="55" rx="6" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1.5"/>
    <text x="75" y="33" fill="#e8e8e8" font-size="11" text-anchor="middle" font-style="italic">"Il gatto è sul</text>
    <text x="60" y="50" fill="#e8e8e8" font-size="11" text-anchor="middle" font-style="italic">___"</text>
    <rect x="43" y="40" width="35" height="14" rx="2" fill="#2a2a4a" opacity="0.7"/>
    <text x="60" y="51" fill="#555570" font-size="11" text-anchor="middle" font-style="italic">___</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="75" x2="400" y2="75" stroke="#8892a0" stroke-width="1.5" marker-end="url(#arrowStep)"/>

  <!-- ============ STEP 3: Il modello predice ============ -->
  <g transform="translate(410, 10)">
    <text x="115" y="0" fill="#8892a0" font-size="11" text-anchor="middle" font-weight="600">3. Il modello predice</text>

    <!-- LLM block -->
    <rect x="0" y="10" width="90" height="95" rx="8" fill="#1e1e38" stroke="#3a3a5a" stroke-width="1.5"/>
    <text x="45" y="28" fill="#e8e8e8" font-size="13" text-anchor="middle" font-weight="bold">LLM</text>

    <!-- 4x3 parameter grid -->
    <g transform="translate(15, 35)">
      <circle cx="0" cy="0" r="4" fill="#4a4a6a"/><circle cx="15" cy="0" r="4" fill="#4a4a6a"/>
      <circle cx="30" cy="0" r="4" fill="#4a4a6a"/><circle cx="45" cy="0" r="4" fill="#4a4a6a"/>
      <circle cx="0" cy="15" r="4" fill="#4a4a6a"/><circle cx="15" cy="15" r="4" fill="#4a4a6a"/>
      <circle cx="30" cy="15" r="4" fill="#4a4a6a"/><circle cx="45" cy="15" r="4" fill="#4a4a6a"/>
      <circle cx="0" cy="30" r="4" fill="#4a4a6a"/><circle cx="15" cy="30" r="4" fill="#4a4a6a"/>
      <circle cx="30" cy="30" r="4" fill="#4a4a6a"/><circle cx="45" cy="30" r="4" fill="#4a4a6a"/>
    </g>

    <!-- Output arrow from LLM to probability distribution -->
    <line x1="93" y1="57" x2="108" y2="57" stroke="#8892a0" stroke-width="1.2" marker-end="url(#arrowStep)"/>

    <!-- Probability distribution -->
    <rect x="112" y="10" width="120" height="95" rx="6" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1.2"/>
    <text x="172" y="28" fill="#8892a0" font-size="9" text-anchor="middle">P(parola)</text>

    <!-- Bar chart style distribution -->
    <rect x="120" y="38" width="56" height="10" rx="2" fill="#4a4a6a"/>
    <text x="182" y="47" fill="#e8e8e8" font-size="9">divano 0.28</text>

    <rect x="120" y="53" width="44" height="10" rx="2" fill="#4a4a6a"/>
    <text x="170" y="62" fill="#e8e8e8" font-size="9">tavolo 0.22</text>

    <rect x="120" y="68" width="36" height="10" rx="2" fill="#4a4a6a"/>
    <text x="162" y="77" fill="#e8e8e8" font-size="9">letto 0.18</text>

    <text x="140" y="92" fill="#555570" font-size="9">...</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="645" y1="75" x2="675" y2="75" stroke="#8892a0" stroke-width="1.5" marker-end="url(#arrowStep)"/>

  <!-- ============ STEP 4: Confronta con verità ============ -->
  <g transform="translate(685, 15)">
    <text x="70" y="0" fill="#8892a0" font-size="11" text-anchor="middle" font-weight="600">4. Confronta con verità</text>

    <!-- Balance / comparison icon -->
    <g transform="translate(42, 18)">
      <!-- Triangle base -->
      <polygon points="28,52 18,40 38,40" fill="#3a3a5a"/>
      <!-- Beam -->
      <line x1="4" y1="28" x2="52" y2="28" stroke="#8892a0" stroke-width="2"/>
      <!-- Fulcrum -->
      <line x1="28" y1="28" x2="28" y2="40" stroke="#8892a0" stroke-width="2"/>
      <!-- Left pan -->
      <path d="M2,28 Q2,36 12,36 L-2,36 Q-6,36 -6,28" fill="none" stroke="#8892a0" stroke-width="1.5"/>
      <text x="4" y="25" fill="#e8e8e8" font-size="7" text-anchor="middle">pred</text>
      <!-- Right pan -->
      <path d="M54,28 Q54,36 44,36 L60,36 Q62,36 62,28" fill="none" stroke="#8892a0" stroke-width="1.5"/>
      <text x="52" y="25" fill="#e8e8e8" font-size="7" text-anchor="middle">reale</text>
    </g>

    <!-- Error label -->
    <rect x="5" y="78" width="130" height="22" rx="4" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1"/>
    <text x="70" y="93" fill="#e8e8e8" font-size="8.5" text-anchor="middle">errore = distanza pred vs reale</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="823" y1="75" x2="853" y2="75" stroke="#8892a0" stroke-width="1.5" marker-end="url(#arrowStep)"/>

  <!-- ============ STEP 5: Aggiorna parametri ============ -->
  <g transform="translate(863, 10)">
    <text x="95" y="0" fill="#8892a0" font-size="11" text-anchor="middle" font-weight="600">5. Aggiorna parametri</text>

    <!-- LLM block copy with highlighted circles -->
    <rect x="30" y="10" width="130" height="95" rx="8" fill="#1e1e38" stroke="#3a3a5a" stroke-width="1.5"/>
    <text x="95" y="28" fill="#e8e8e8" font-size="13" text-anchor="middle" font-weight="bold">LLM</text>

    <!-- 4x3 parameter grid — some highlighted in accent -->
    <g transform="translate(50, 35)">
      <circle cx="0" cy="0" r="4.5" fill="#00b4d8"/><circle cx="15" cy="0" r="4.5" fill="#4a4a6a"/>
      <circle cx="30" cy="0" r="4.5" fill="#4a4a6a"/><circle cx="45" cy="0" r="4.5" fill="#00b4d8"/>
      <circle cx="0" cy="15" r="4.5" fill="#4a4a6a"/><circle cx="15" cy="15" r="4.5" fill="#00b4d8"/>
      <circle cx="30" cy="15" r="4.5" fill="#00b4d8"/><circle cx="45" cy="15" r="4.5" fill="#4a4a6a"/>
      <circle cx="0" cy="30" r="4.5" fill="#00b4d8"/><circle cx="15" cy="30" r="4.5" fill="#4a4a6a"/>
      <circle cx="30" cy="30" r="4.5" fill="#4a4a6a"/><circle cx="45" cy="30" r="4.5" fill="#00b4d8"/>
    </g>

    <!-- Backpropagation label -->
    <text x="95" y="115" fill="#8892a0" font-size="9" text-anchor="middle" font-style="italic">backpropagation</text>
  </g>

  <!-- ============ CURVED ARROW: ripetuto trilioni di volte ============ -->
  <path d="M60,155 Q60,195 120,195 L980,195 Q1040,195 1040,155"
        fill="none" stroke="#00b4d8" stroke-width="2" stroke-dasharray="6,3"
        marker-start="url(#arrowBack)"/>
  <text x="550" y="215" fill="#00b4d8" font-size="13" text-anchor="middle" font-weight="600" font-style="italic">ripetuto trilioni di volte</text>

  <!-- ============ LOWER RIGHT: Mini Loss Chart ============ -->
  <g transform="translate(770, 270)">
    <!-- Chart background -->
    <rect x="0" y="0" width="300" height="200" rx="8" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1.2"/>

    <!-- Title -->
    <text x="150" y="22" fill="#e8e8e8" font-size="12" text-anchor="middle" font-weight="600">Loss durante il training</text>

    <!-- Axes -->
    <line x1="45" y1="35" x2="45" y2="170" stroke="#555570" stroke-width="1.2"/>
    <line x1="45" y1="170" x2="275" y2="170" stroke="#555570" stroke-width="1.2"/>

    <!-- Y axis label -->
    <text x="18" y="105" fill="#8892a0" font-size="10" text-anchor="middle" transform="rotate(-90, 18, 105)">loss</text>

    <!-- X axis label -->
    <text x="160" y="190" fill="#8892a0" font-size="10" text-anchor="middle">step di training</text>

    <!-- Grid lines (subtle) -->
    <line x1="45" y1="60" x2="275" y2="60" stroke="#333355" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="45" y1="90" x2="275" y2="90" stroke="#333355" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="45" y1="120" x2="275" y2="120" stroke="#333355" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="45" y1="150" x2="275" y2="150" stroke="#333355" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- Loss curve: starts high, drops steeply, flattens asymptotically -->
    <path d="M48,42 Q65,45 80,70 Q100,110 130,135 Q160,150 190,155 Q220,158 250,160 L272,161"
          fill="none" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Subtle glow effect on curve -->
    <path d="M48,42 Q65,45 80,70 Q100,110 130,135 Q160,150 190,155 Q220,158 250,160 L272,161"
          fill="none" stroke="#00b4d8" stroke-width="5" stroke-linecap="round" opacity="0.15"/>

    <!-- Annotation -->
    <text x="195" y="140" fill="#00b4d8" font-size="9" font-style="italic" opacity="0.85">la loss scende</text>
    <text x="205" y="152" fill="#00b4d8" font-size="9" font-style="italic" opacity="0.85">man mano</text>
  </g>
</svg>
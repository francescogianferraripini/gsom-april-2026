<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <title>Enterprise Knowledge Graph — struttura a tre strati</title>
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-ekg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a1245a"/>
    </marker>
  </defs>

  <!-- Trapezoid title (above) -->
  <text x="350" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#a1245a" letter-spacing="2">ENTERPRISE KNOWLEDGE GRAPH</text>

  <!-- LAYER 1: ONTOLOGY (top, darkest) -->
  <polygon points="200,60 500,60 533,186 167,186" fill="#a1245a" stroke="#7f1845" stroke-width="1"/>
  <text x="350" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">ENTERPRISE ONTOLOGY</text>
  <!-- Mini graph of concepts -->
  <g id="ontology-graph">
    <line x1="330" y1="138" x2="390" y2="142" stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
    <line x1="330" y1="138" x2="360" y2="167" stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
    <line x1="390" y1="142" x2="360" y2="167" stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
    <line x1="330" y1="138" x2="298" y2="158" stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
    <circle cx="330" cy="138" r="8" fill="#ffffff" stroke="#7f1845" stroke-width="1.2"/>
    <circle cx="390" cy="142" r="8" fill="#ffffff" stroke="#7f1845" stroke-width="1.2"/>
    <circle cx="360" cy="167" r="7" fill="#ffffff" stroke="#7f1845" stroke-width="1.2"/>
    <circle cx="298" cy="158" r="6" fill="#ffffff" stroke="#7f1845" stroke-width="1.2"/>
  </g>

  <!-- LAYER 2: DATA PRODUCTS (middle) -->
  <polygon points="167,186 533,186 567,313 133,313" fill="#c85d8a" stroke="#9c3f66" stroke-width="1"/>
  <text x="350" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">DATA PRODUCTS</text>
  <!-- Two hexagons -->
  <polygon points="270,240 310,240 330,260 310,280 270,280 250,260" fill="#ffffff" stroke="#9c3f66" stroke-width="1.5"/>
  <polygon points="395,240 435,240 455,260 435,280 395,280 375,260" fill="#ffffff" stroke="#9c3f66" stroke-width="1.5"/>

  <!-- Semantic Linking annotation (left side) -->
  <text x="12" y="254" font-size="11" fill="#a1245a" font-weight="600">Semantic</text>
  <text x="12" y="268" font-size="11" fill="#a1245a" font-weight="600">Linking</text>
  <line x1="78" y1="260" x2="128" y2="254" stroke="#a1245a" stroke-width="1.2" marker-end="url(#arrow-ekg)"/>

  <!-- Vertical dashed lines from hexagons up to ontology nodes -->
  <line x1="290" y1="240" x2="315" y2="174" stroke="#9c3f66" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="415" y1="240" x2="385" y2="174" stroke="#9c3f66" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- LAYER 3: PHYSICAL DATA ASSETS (bottom, palest) -->
  <polygon points="133,313 567,313 600,440 100,440" fill="#fae0ec" stroke="#d8a8bc" stroke-width="1"/>
  <text x="350" y="336" text-anchor="middle" font-size="11" font-weight="700" fill="#a1245a" letter-spacing="1.5">PHYSICAL DATA ASSETS</text>

  <!-- Unstructured icons (left) -->
  <g id="unstructured">
    <rect x="200" y="360" width="22" height="28" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
    <line x1="204" y1="368" x2="218" y2="368" stroke="#a1245a" stroke-width="0.7"/>
    <line x1="204" y1="374" x2="218" y2="374" stroke="#a1245a" stroke-width="0.7"/>
    <line x1="204" y1="380" x2="215" y2="380" stroke="#a1245a" stroke-width="0.7"/>
    <rect x="225" y="365" width="22" height="28" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
    <line x1="229" y1="373" x2="243" y2="373" stroke="#a1245a" stroke-width="0.7"/>
    <line x1="229" y1="379" x2="243" y2="379" stroke="#a1245a" stroke-width="0.7"/>
    <text x="218" y="412" text-anchor="middle" font-size="9.5" fill="#a1245a" font-weight="600" letter-spacing="0.8">UNSTRUCTURED</text>
    <!-- dashed link to DP hexagon -->
    <line x1="222" y1="360" x2="275" y2="283" stroke="#9c3f66" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  </g>

  <!-- Structured icons (right) - cylinders -->
  <g id="structured">
    <g transform="translate(430,360)">
      <ellipse cx="12" cy="2" rx="12" ry="3.5" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
      <path d="M 0 2 L 0 24 A 12 3.5 0 0 0 24 24 L 24 2" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
      <ellipse cx="12" cy="10" rx="12" ry="3.5" fill="none" stroke="#a1245a" stroke-width="0.6"/>
      <ellipse cx="12" cy="17" rx="12" ry="3.5" fill="none" stroke="#a1245a" stroke-width="0.6"/>
    </g>
    <g transform="translate(470,363)">
      <ellipse cx="12" cy="2" rx="12" ry="3.5" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
      <path d="M 0 2 L 0 24 A 12 3.5 0 0 0 24 24 L 24 2" fill="#ffffff" stroke="#a1245a" stroke-width="1"/>
      <ellipse cx="12" cy="10" rx="12" ry="3.5" fill="none" stroke="#a1245a" stroke-width="0.6"/>
      <ellipse cx="12" cy="17" rx="12" ry="3.5" fill="none" stroke="#a1245a" stroke-width="0.6"/>
    </g>
    <text x="470" y="412" text-anchor="middle" font-size="9.5" fill="#a1245a" font-weight="600" letter-spacing="0.8">STRUCTURED</text>
    <!-- dashed link to DP hexagon -->
    <line x1="454" y1="360" x2="415" y2="283" stroke="#9c3f66" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 420">
  <title>Anatomia di Deep Research: elicitation → retrieve paralleli → loop di steering → sintesi finale</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .phase-num { font-size: 10px; fill: #a1245a; font-weight: 600; letter-spacing: 0.1em; }
      .phase-title { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
      .src-label { font-size: 9px; fill: #838383; }
      .annot { font-size: 9.5px; fill: #838383; font-style: italic; }
      .accent-label { font-size: 10px; fill: #a1245a; font-weight: 600; font-style: italic; }
    </style>
    <marker id="dr-arr-dark" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a"/>
    </marker>
    <marker id="dr-arr-muted" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#838383"/>
    </marker>
    <marker id="dr-arr-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a1245a"/>
    </marker>
  </defs>

  <rect width="1140" height="420" fill="#ffffff"/>

  <!-- ================= FASE 1 ================= -->
  <g>
    <rect x="30" y="50" width="230" height="260" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="145" y="40" text-anchor="middle" class="phase-num">F1 — ELICITATION</text>

    <!-- Agent icon (single circle) -->
    <circle cx="105" cy="130" r="22" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="105" y="134" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="600">A</text>
    <text x="105" y="170" text-anchor="middle" font-size="9" fill="#838383">agente principale</text>

    <!-- Arrow to plan doc -->
    <line x1="130" y1="130" x2="165" y2="130" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#dr-arr-dark)"/>

    <!-- Plan document -->
    <rect x="175" y="100" width="70" height="90" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="183" y1="114" x2="237" y2="114" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="124" x2="230" y2="124" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="134" x2="237" y2="134" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="144" x2="225" y2="144" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="154" x2="237" y2="154" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="164" x2="232" y2="164" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="183" y1="174" x2="220" y2="174" stroke="#c9c9c9" stroke-width="1.2"/>
    <text x="210" y="205" text-anchor="middle" font-size="9" fill="#838383">piano</text>

    <text x="145" y="250" text-anchor="middle" class="phase-title">Elicitation del piano</text>
    <text x="145" y="268" text-anchor="middle" class="annot">analizza richiesta,</text>
    <text x="145" y="282" text-anchor="middle" class="annot">produce piano strutturato</text>
  </g>

  <!-- Arrow F1 -> F2 -->
  <line x1="264" y1="180" x2="294" y2="180" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#dr-arr-dark)"/>

  <!-- ================= FASE 2 ================= -->
  <g>
    <rect x="300" y="50" width="270" height="260" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="435" y="40" text-anchor="middle" class="phase-num">F2 — RETRIEVE PARALLELI</text>

    <!-- Main agent top -->
    <circle cx="435" cy="90" r="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="435" y="93" text-anchor="middle" font-size="9" fill="#1a1a1a" font-weight="600">A</text>

    <!-- Sub-agents -->
    <circle cx="345" cy="180" r="14" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="345" y="183" text-anchor="middle" font-size="8" fill="#1a1a1a">s1</text>
    <circle cx="410" cy="180" r="14" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="410" y="183" text-anchor="middle" font-size="8" fill="#1a1a1a">s2</text>
    <circle cx="475" cy="180" r="14" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="475" y="183" text-anchor="middle" font-size="8" fill="#1a1a1a">s3</text>
    <circle cx="540" cy="180" r="14" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="540" y="183" text-anchor="middle" font-size="8" fill="#1a1a1a">s4</text>

    <!-- Delegation arrows A -> subs -->
    <line x1="423" y1="106" x2="350" y2="166" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="430" y1="108" x2="411" y2="166" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="440" y1="108" x2="470" y2="166" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="448" y1="106" x2="535" y2="166" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>

    <!-- Sub-agents -> sources -->
    <line x1="345" y1="196" x2="345" y2="222" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="410" y1="196" x2="410" y2="222" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="475" y1="196" x2="475" y2="222" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <line x1="540" y1="196" x2="540" y2="222" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>

    <!-- Source icons -->
    <g>
      <rect x="331" y="224" width="28" height="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="345" y="239" text-anchor="middle" font-size="8" fill="#1a1a1a">web</text>
    </g>
    <g>
      <rect x="396" y="224" width="28" height="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="410" y="239" text-anchor="middle" font-size="8" fill="#1a1a1a">web</text>
    </g>
    <g>
      <rect x="461" y="224" width="28" height="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
      <text x="475" y="239" text-anchor="middle" font-size="8" fill="#1a1a1a">docs</text>
    </g>
    <g>
      <ellipse cx="540" cy="230" rx="14" ry="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M526,230 L526,244 Q526,248 540,248 Q554,248 554,244 L554,230" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <text x="540" y="240" text-anchor="middle" font-size="7" fill="#1a1a1a">DB</text>
    </g>

    <text x="435" y="272" text-anchor="middle" class="phase-title">Retrieve paralleli</text>
    <text x="435" y="289" text-anchor="middle" class="annot">sub-agent con contesto isolato</text>
  </g>

  <!-- Arrow F2 -> F3 -->
  <line x1="574" y1="180" x2="604" y2="180" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#dr-arr-dark)"/>

  <!-- ================= FASE 3 ================= -->
  <g>
    <rect x="610" y="50" width="260" height="260" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="740" y="40" text-anchor="middle" class="phase-num">F3 — STEERING LOOP</text>

    <!-- Central agent -->
    <circle cx="740" cy="165" r="22" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="740" y="168" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="600">A</text>

    <!-- Cyclic arrows around -->
    <!-- arrow to sub top-left -->
    <circle cx="660" cy="110" r="11" fill="none" stroke="#1a1a1a" stroke-width="1.1"/>
    <path d="M720,150 Q690,120 672,118" fill="none" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <path d="M668,122 Q710,140 722,158" fill="none" stroke="#838383" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- sub top-right -->
    <circle cx="820" cy="110" r="11" fill="none" stroke="#1a1a1a" stroke-width="1.1"/>
    <path d="M758,150 Q790,120 808,118" fill="none" stroke="#838383" stroke-width="1" marker-end="url(#dr-arr-muted)"/>
    <path d="M812,122 Q770,140 758,158" fill="none" stroke="#838383" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- new sub bottom-right (spawned) -->
    <circle cx="820" cy="220" r="11" fill="none" stroke="#a1245a" stroke-width="1.4" stroke-dasharray="3,2"/>
    <text x="820" y="223" text-anchor="middle" font-size="7" fill="#a1245a" font-weight="600">+</text>
    <path d="M758,180 Q790,210 808,212" fill="none" stroke="#a1245a" stroke-width="1" marker-end="url(#dr-arr-accent)"/>

    <!-- gap analysis label -->
    <text x="740" y="258" text-anchor="middle" class="accent-label">gap analysis</text>

    <text x="740" y="278" text-anchor="middle" class="phase-title">Loop di steering</text>
    <text x="740" y="295" text-anchor="middle" class="annot">spawna sub-agent sui gap</text>
  </g>

  <!-- Arrow F3 -> F4 -->
  <line x1="874" y1="180" x2="904" y2="180" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#dr-arr-dark)"/>

  <!-- F3 return arrow back to F2 (ACCENT) -->
  <g>
    <path d="M620 330 Q445 375 315 330" fill="none" stroke="#a1245a" stroke-width="1.8" marker-end="url(#dr-arr-accent)"/>
    <text x="470" y="372" text-anchor="middle" class="accent-label">iterazione</text>
  </g>

  <!-- ================= FASE 4 ================= -->
  <g>
    <rect x="910" y="50" width="210" height="260" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="1015" y="40" text-anchor="middle" class="phase-num">F4 — SINTESI</text>

    <!-- Central agent -->
    <circle cx="960" cy="130" r="20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="960" y="134" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="600">A</text>

    <!-- Arrow to doc -->
    <line x1="982" y1="130" x2="1010" y2="130" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#dr-arr-dark)"/>

    <!-- Final document with citations -->
    <rect x="1020" y="85" width="85" height="115" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="1028" y1="100" x2="1097" y2="100" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="1028" y1="110" x2="1085" y2="110" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="1028" y1="120" x2="1097" y2="120" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="1028" y1="130" x2="1092" y2="130" stroke="#c9c9c9" stroke-width="1.2"/>
    <line x1="1028" y1="140" x2="1080" y2="140" stroke="#c9c9c9" stroke-width="1.2"/>
    <!-- citations -->
    <circle cx="1088" cy="110" r="3" fill="#a1245a"/>
    <text x="1088" y="112.5" text-anchor="middle" font-size="5" fill="#fff">1</text>
    <circle cx="1095" cy="130" r="3" fill="#a1245a"/>
    <text x="1095" y="132.5" text-anchor="middle" font-size="5" fill="#fff">2</text>
    <line x1="1028" y1="160" x2="1097" y2="160" stroke="#a1245a" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="1062" y="175" text-anchor="middle" font-size="7" fill="#a1245a" font-style="italic">[1] [2] fonti</text>
    <text x="1062" y="188" text-anchor="middle" font-size="7" fill="#a1245a" font-style="italic">citate</text>

    <text x="1015" y="250" text-anchor="middle" class="phase-title">Sintesi finale</text>
    <text x="1015" y="268" text-anchor="middle" class="annot">l'utente vede</text>
    <text x="1015" y="282" text-anchor="middle" class="annot">solo questo</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360">
  <title>Memoria — due sessioni nel tempo con archivio persistente al centro</title>
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-mem" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#a1245a"/>
    </marker>
    <marker id="arrow-mem-grey" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#bbbbbb"/>
    </marker>
    <marker id="arrow-time" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#838383"/>
    </marker>
  </defs>

  <!-- ================================ -->
  <!-- COLUMN HEADERS                   -->
  <!-- ================================ -->
  <text x="160" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Sessione 1</text>
  <text x="550" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#a1245a">Archivio persistente</text>
  <text x="940" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Sessione 2</text>

  <!-- ================================ -->
  <!-- LEFT: SESSION 1                  -->
  <!-- ================================ -->
  <g id="session1">
    <rect x="40" y="50" width="240" height="170" rx="8" fill="#fafafa" stroke="#dddddd" stroke-width="1"/>

    <!-- user msg -->
    <rect x="55" y="65" width="140" height="22" rx="10" fill="#ededed" stroke="#cccccc" stroke-width="0.8"/>
    <text x="64" y="80" font-size="10" fill="#555555">utente: …</text>

    <!-- model msg -->
    <rect x="125" y="95" width="140" height="22" rx="10" fill="#f5e1ea" stroke="#c8a0b0" stroke-width="0.8"/>
    <text x="134" y="110" font-size="10" fill="#a1245a">modello: …</text>

    <!-- user msg -->
    <rect x="55" y="125" width="140" height="22" rx="10" fill="#ededed" stroke="#cccccc" stroke-width="0.8"/>
    <text x="64" y="140" font-size="10" fill="#555555">utente: …</text>

    <!-- model msg -->
    <rect x="125" y="155" width="140" height="22" rx="10" fill="#f5e1ea" stroke="#c8a0b0" stroke-width="0.8"/>
    <text x="134" y="170" font-size="10" fill="#a1245a">modello: …</text>

    <text x="160" y="204" text-anchor="middle" font-size="10" fill="#838383" font-style="italic">conversazione in corso</text>
  </g>

  <!-- extraction arrow from session 1 to archive -->
  <path d="M 280 150 Q 390 150 490 160" fill="none" stroke="#a1245a" stroke-width="1.8" marker-end="url(#arrow-mem)"/>
  <text x="380" y="140" text-anchor="middle" font-size="10.5" fill="#a1245a" font-weight="500">harness estrae fatti</text>

  <!-- ================================ -->
  <!-- CENTER: ARCHIVE                  -->
  <!-- ================================ -->
  <g id="archive">
    <!-- Cylinder icon -->
    <g transform="translate(490,90)">
      <ellipse cx="60" cy="10" rx="45" ry="10" fill="#f5e1ea" stroke="#a1245a" stroke-width="1.5"/>
      <rect x="15" y="10" width="90" height="80" fill="#f5e1ea" stroke="#a1245a" stroke-width="1.5"/>
      <ellipse cx="60" cy="90" rx="45" ry="10" fill="#f5e1ea" stroke="#a1245a" stroke-width="1.5"/>
      <!-- cover top ellipse -->
      <path d="M 15 10 A 45 10 0 0 0 105 10" fill="none" stroke="#a1245a" stroke-width="1.5"/>
      <!-- lines representing facts -->
      <line x1="28" y1="35" x2="92" y2="35" stroke="#a1245a" stroke-width="0.8" opacity="0.7"/>
      <line x1="28" y1="48" x2="86" y2="48" stroke="#a1245a" stroke-width="0.8" opacity="0.7"/>
      <line x1="28" y1="61" x2="92" y2="61" stroke="#a1245a" stroke-width="0.8" opacity="0.7"/>
      <line x1="28" y1="74" x2="80" y2="74" stroke="#a1245a" stroke-width="0.8" opacity="0.7"/>
    </g>
    <text x="550" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#a1245a">DB · vector store</text>
    <text x="550" y="224" text-anchor="middle" font-size="10" fill="#838383" font-style="italic">fatti archiviati</text>
  </g>

  <!-- retrieval arrow from archive to session 2 -->
  <path d="M 610 160 Q 720 150 820 150" fill="none" stroke="#a1245a" stroke-width="1.8" marker-end="url(#arrow-mem)"/>
  <text x="720" y="140" text-anchor="middle" font-size="10.5" fill="#a1245a" font-weight="500">harness inietta fatti</text>

  <!-- ================================ -->
  <!-- RIGHT: SESSION 2                 -->
  <!-- ================================ -->
  <g id="session2">
    <rect x="820" y="50" width="240" height="170" rx="8" fill="#fafafa" stroke="#dddddd" stroke-width="1"/>

    <!-- injected memory bubble at top -->
    <rect x="835" y="65" width="210" height="28" rx="6" fill="#f5e1ea" stroke="#a1245a" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="940" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#a1245a">memoria già presente</text>
    <text x="940" y="89" text-anchor="middle" font-size="9" fill="#a1245a" opacity="0.8">iniettata nel system prompt</text>

    <!-- user msg -->
    <rect x="835" y="105" width="140" height="22" rx="10" fill="#ededed" stroke="#cccccc" stroke-width="0.8"/>
    <text x="844" y="120" font-size="10" fill="#555555">utente: …</text>

    <!-- model msg -->
    <rect x="905" y="135" width="140" height="22" rx="10" fill="#f5e1ea" stroke="#c8a0b0" stroke-width="0.8"/>
    <text x="914" y="150" font-size="10" fill="#a1245a">modello: …</text>

    <!-- user msg -->
    <rect x="835" y="165" width="140" height="22" rx="10" fill="#ededed" stroke="#cccccc" stroke-width="0.8"/>
    <text x="844" y="180" font-size="10" fill="#555555">utente: …</text>

    <text x="940" y="209" text-anchor="middle" font-size="10" fill="#838383" font-style="italic">conversazione successiva</text>
  </g>

  <!-- ================================ -->
  <!-- TIME AXIS                        -->
  <!-- ================================ -->
  <line x1="40" y1="280" x2="1060" y2="280" stroke="#838383" stroke-width="1.2" marker-end="url(#arrow-time)"/>
  <text x="550" y="300" text-anchor="middle" font-size="11" fill="#838383" font-style="italic">tempo</text>

  <!-- tick marks under sessions -->
  <line x1="160" y1="275" x2="160" y2="285" stroke="#838383" stroke-width="1"/>
  <line x1="940" y1="275" x2="940" y2="285" stroke="#838383" stroke-width="1"/>
  <text x="160" y="320" text-anchor="middle" font-size="10" fill="#838383">t</text>
  <text x="940" y="320" text-anchor="middle" font-size="10" fill="#838383">t + N</text>

  <!-- Caption bottom -->
  <text x="550" y="348" text-anchor="middle" font-size="10.5" fill="#1a1a1a">Il modello è stateless — la "memoria" vive interamente nell'harness e nell'archivio.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 400" font-family="sans-serif">

  <!-- INPUT RECTANGLES (left side) -->
  <!-- Input 1 -->
  <rect x="10" y="45" width="150" height="42" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="1"/>
  <text x="85" y="71" text-anchor="middle" fill="#1a1a1a" font-size="11">Il gatto è sul...</text>

  <!-- Input 2 -->
  <rect x="10" y="135" width="150" height="42" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="1"/>
  <text x="85" y="152" text-anchor="middle" fill="#1a1a1a" font-size="9.5">La capitale di Francia</text>
  <text x="85" y="166" text-anchor="middle" fill="#1a1a1a" font-size="9.5">è...</text>

  <!-- Input 3 -->
  <rect x="10" y="225" width="150" height="42" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="1"/>
  <text x="85" y="251" text-anchor="middle" fill="#1a1a1a" font-size="11">Buongiorno, come...</text>

  <!-- ARROWS: inputs to LLM -->
  <defs>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0c0c0"/>
    </marker>
  </defs>
  <line x1="162" y1="66" x2="210" y2="155" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <line x1="162" y1="156" x2="210" y2="160" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <line x1="162" y1="246" x2="210" y2="165" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- LLM BLOCK (center) -->
  <rect x="212" y="110" width="110" height="100" rx="10" fill="#f2f2f2" stroke="#a1245a" stroke-width="2.5"/>
  <text x="267" y="150" text-anchor="middle" fill="#a1245a" font-size="26" font-weight="bold">LLM</text>
  <text x="267" y="170" text-anchor="middle" fill="#838383" font-size="9">f(x) → P(token)</text>
  <text x="267" y="185" text-anchor="middle" fill="#838383" font-size="8">next-token prediction</text>

  <!-- ARROWS: LLM to outputs -->
  <line x1="324" y1="145" x2="368" y2="62" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <line x1="324" y1="160" x2="368" y2="160" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <line x1="324" y1="175" x2="368" y2="258" stroke="#c0c0c0" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- OUTPUT BAR CHARTS (right side) -->

  <!-- === Output 1: tavolo 0.35, divano 0.20, letto 0.15, tetto 0.10, altro 0.20 === -->
  <g transform="translate(375, 20)">
    <rect x="-3" y="-5" width="170" height="95" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="0.8"/>
    <!-- bars: max height 55px at prob 0.35 -->
    <!-- tavolo 0.35 => 55 -->
    <rect x="8" y="15" width="20" height="55" rx="2" fill="#a1245a"/>
    <text x="18" y="80" text-anchor="middle" fill="#1a1a1a" font-size="7.5">tavolo</text>
    <text x="18" y="12" text-anchor="middle" fill="#a1245a" font-size="6.5">.35</text>
    <!-- divano 0.20 => 31.4 -->
    <rect x="38" y="38.6" width="20" height="31.4" rx="2" fill="#d8d8d8"/>
    <text x="48" y="80" text-anchor="middle" fill="#838383" font-size="7.5">divano</text>
    <text x="48" y="36" text-anchor="middle" fill="#838383" font-size="6.5">.20</text>
    <!-- letto 0.15 => 23.6 -->
    <rect x="68" y="46.4" width="20" height="23.6" rx="2" fill="#d8d8d8"/>
    <text x="78" y="80" text-anchor="middle" fill="#838383" font-size="7.5">letto</text>
    <text x="78" y="44" text-anchor="middle" fill="#838383" font-size="6.5">.15</text>
    <!-- tetto 0.10 => 15.7 -->
    <rect x="98" y="54.3" width="20" height="15.7" rx="2" fill="#d8d8d8"/>
    <text x="108" y="80" text-anchor="middle" fill="#838383" font-size="7.5">tetto</text>
    <text x="108" y="52" text-anchor="middle" fill="#838383" font-size="6.5">.10</text>
    <!-- altro 0.20 => 31.4 -->
    <rect x="128" y="38.6" width="20" height="31.4" rx="2" fill="#d8d8e8"/>
    <text x="138" y="80" text-anchor="middle" fill="#838383" font-size="7.5">altro</text>
    <text x="138" y="36" text-anchor="middle" fill="#838383" font-size="6.5">.20</text>
  </g>

  <!-- === Output 2: Parigi 0.78, Lione 0.08, Marsiglia 0.05, Francia 0.04, altro 0.05 === -->
  <g transform="translate(375, 120)">
    <rect x="-3" y="-5" width="170" height="95" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="0.8"/>
    <!-- bars: max height 55px at prob 0.78 -->
    <!-- Parigi 0.78 => 55 -->
    <rect x="8" y="15" width="20" height="55" rx="2" fill="#a1245a"/>
    <text x="18" y="80" text-anchor="middle" fill="#1a1a1a" font-size="7.5">Parigi</text>
    <text x="18" y="12" text-anchor="middle" fill="#a1245a" font-size="6.5">.78</text>
    <!-- Lione 0.08 => 5.6 -->
    <rect x="38" y="64.4" width="20" height="5.6" rx="2" fill="#d8d8d8"/>
    <text x="48" y="80" text-anchor="middle" fill="#838383" font-size="7.5">Lione</text>
    <text x="48" y="62" text-anchor="middle" fill="#838383" font-size="6.5">.08</text>
    <!-- Marsiglia 0.05 => 3.5 -->
    <rect x="68" y="66.5" width="20" height="3.5" rx="2" fill="#d8d8d8"/>
    <text x="78" y="80" text-anchor="middle" fill="#838383" font-size="6">Marsiglia</text>
    <text x="78" y="64" text-anchor="middle" fill="#838383" font-size="6.5">.05</text>
    <!-- Francia 0.04 => 2.8 -->
    <rect x="98" y="67.2" width="20" height="2.8" rx="2" fill="#d8d8d8"/>
    <text x="108" y="80" text-anchor="middle" fill="#838383" font-size="7">Francia</text>
    <text x="108" y="64.5" text-anchor="middle" fill="#838383" font-size="6.5">.04</text>
    <!-- altro 0.05 => 3.5 -->
    <rect x="128" y="66.5" width="20" height="3.5" rx="2" fill="#d8d8e8"/>
    <text x="138" y="80" text-anchor="middle" fill="#838383" font-size="7.5">altro</text>
    <text x="138" y="64" text-anchor="middle" fill="#838383" font-size="6.5">.05</text>
  </g>

  <!-- === Output 3: stai 0.40, va 0.35, sta 0.12, ti 0.08, altro 0.05 === -->
  <g transform="translate(375, 220)">
    <rect x="-3" y="-5" width="170" height="95" rx="6" fill="#f0f0f0" stroke="#c0c0c0" stroke-width="0.8"/>
    <!-- bars: max height 55px at prob 0.40 -->
    <!-- stai 0.40 => 55 -->
    <rect x="8" y="15" width="20" height="55" rx="2" fill="#a1245a"/>
    <text x="18" y="80" text-anchor="middle" fill="#1a1a1a" font-size="7.5">stai</text>
    <text x="18" y="12" text-anchor="middle" fill="#a1245a" font-size="6.5">.40</text>
    <!-- va 0.35 => 48.1 -->
    <rect x="38" y="21.9" width="20" height="48.1" rx="2" fill="#d8d8d8"/>
    <text x="48" y="80" text-anchor="middle" fill="#838383" font-size="7.5">va</text>
    <text x="48" y="19" text-anchor="middle" fill="#838383" font-size="6.5">.35</text>
    <!-- sta 0.12 => 16.5 -->
    <rect x="68" y="53.5" width="20" height="16.5" rx="2" fill="#d8d8d8"/>
    <text x="78" y="80" text-anchor="middle" fill="#838383" font-size="7.5">sta</text>
    <text x="78" y="51" text-anchor="middle" fill="#838383" font-size="6.5">.12</text>
    <!-- ti 0.08 => 11 -->
    <rect x="98" y="59" width="20" height="11" rx="2" fill="#d8d8d8"/>
    <text x="108" y="80" text-anchor="middle" fill="#838383" font-size="7.5">ti</text>
    <text x="108" y="56.5" text-anchor="middle" fill="#838383" font-size="6.5">.08</text>
    <!-- altro 0.05 => 6.9 -->
    <rect x="128" y="63.1" width="20" height="6.9" rx="2" fill="#d8d8e8"/>
    <text x="138" y="80" text-anchor="middle" fill="#838383" font-size="7.5">altro</text>
    <text x="138" y="60.5" text-anchor="middle" fill="#838383" font-size="6.5">.05</text>
  </g>

  <!-- Labels -->
  <text x="85" y="300" text-anchor="middle" fill="#838383" font-size="10">Input (prompt)</text>
  <text x="460" y="340" text-anchor="middle" fill="#838383" font-size="10">P(next token)</text>

</svg>
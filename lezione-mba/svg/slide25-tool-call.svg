<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <title>Tool Calling Mechanism - Sequence diagram showing how a user question is answered via tool call to CRM</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .label { font-size: 9.5px; }
      .label-muted { font-size: 9.5px; fill: #838383; font-style: italic; }
      .label-accent { font-size: 9px; fill: #a1245a; }
      .label-dark { font-size: 9.5px; fill: #1a1a1a; }
      .step-num { font-size: 8.5px; fill: #fff; font-weight: 600; }
      .header-text { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .sub-label { font-size: 8.5px; fill: #838383; font-style: italic; }
    </style>
    <marker id="arr-dark" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a" />
    </marker>
    <marker id="arr-muted" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#838383" />
    </marker>
    <marker id="arr-accent" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#a1245a" />
    </marker>
    <marker id="arr-accent-left" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto-start-reverse">
      <path d="M7,0 L0,2.5 L7,5" fill="#a1245a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="#ffffff"/>

  <!-- ==================== COLUMN POSITIONS ==================== -->
  <!-- User: x=110 | Harness: x=380 | Model: x=700 | CRM: x=980 -->

  <!-- ==================== COLUMN HEADERS ==================== -->
  <g id="headers">
    <!-- User -->
    <rect x="62" y="20" width="96" height="38" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.8"/>
    <!-- Person icon -->
    <circle cx="95" cy="33" r="5" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M86,47 Q86,41 95,41 Q104,41 104,47" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="120" y="43" text-anchor="middle" class="header-text">User</text>

    <!-- Harness -->
    <rect x="318" y="20" width="124" height="38" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.8"/>
    <text x="380" y="44" text-anchor="middle" class="header-text">Harness</text>
    <text x="380" y="70" text-anchor="middle" class="sub-label">esegue</text>

    <!-- Model (LLM) -->
    <rect x="632" y="20" width="136" height="38" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.8"/>
    <text x="700" y="44" text-anchor="middle" class="header-text">Model (LLM)</text>
    <text x="700" y="70" text-anchor="middle" class="sub-label">decide</text>

    <!-- CRM -->
    <rect x="920" y="20" width="120" height="38" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.8"/>
    <!-- Database icon -->
    <ellipse cx="953" cy="34" rx="8" ry="4" fill="none" stroke="#1a1a1a" stroke-width="1.1"/>
    <path d="M945,34 L945,44 Q945,48 953,48 Q961,48 961,44 L961,34" fill="none" stroke="#1a1a1a" stroke-width="1.1"/>
    <text x="998" y="44" text-anchor="middle" class="header-text">CRM</text>
  </g>

  <!-- ==================== SYSTEM PROMPT BOX (at top of Model column) ==================== -->
  <g id="system-prompt-box">
    <rect x="645" y="78" width="110" height="52" rx="6" fill="rgba(161,36,90,0.04)" stroke="#a1245a" stroke-width="0.9" stroke-dasharray="4,3"/>
    <!-- Tiny text lines suggesting prompt content -->
    <rect x="655" y="88" width="50" height="2.5" rx="1" fill="#d0d0d0"/>
    <rect x="655" y="95" width="70" height="2.5" rx="1" fill="#d0d0d0"/>
    <!-- Highlighted "tool definitions" line -->
    <rect x="655" y="102" width="88" height="11" rx="2" fill="rgba(161,36,90,0.1)"/>
    <text x="699" y="110.5" text-anchor="middle" font-size="7.5" fill="#a1245a" font-weight="500">tool definitions</text>
    <!-- Small label -->
    <text x="700" y="124" text-anchor="middle" font-size="7" fill="#a1245a" font-style="italic" opacity="0.7">system prompt</text>
  </g>

  <!-- ==================== VERTICAL LANE LINES ==================== -->
  <g id="lanes" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="5,4">
    <line x1="110" y1="60" x2="110" y2="490"/>
    <line x1="380" y1="60" x2="380" y2="490"/>
    <line x1="700" y1="135" x2="700" y2="490"/>
    <line x1="980" y1="60" x2="980" y2="490"/>
  </g>

  <!-- ==================== ARROWS ==================== -->
  <!-- Y positions: 160, 208, 256, 304, 352, 400, 440, 478 -->

  <!-- STEP 1: User -> Harness (dark) -->
  <g id="step1">
    <circle cx="122" cy="160" r="9" fill="#1a1a1a"/>
    <text x="122" y="163.5" text-anchor="middle" class="step-num">1</text>
    <line x1="134" y1="160" x2="368" y2="160" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arr-dark)"/>
    <text x="251" y="152" text-anchor="middle" font-size="9" fill="#1a1a1a" font-style="italic">"Stato ordine #A-7842 Rossi SpA?"</text>
  </g>

  <!-- STEP 2: Harness -> Model (muted) — connects to system prompt area -->
  <g id="step2">
    <circle cx="392" cy="208" r="9" fill="#838383"/>
    <text x="392" y="211.5" text-anchor="middle" class="step-num">2</text>
    <line x1="404" y1="208" x2="688" y2="208" stroke="#838383" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arr-muted)"/>
    <text x="546" y="200" text-anchor="middle" font-size="9" fill="#838383" font-style="italic">contesto completo</text>
    <!-- Small connector line from arrow to system prompt box -->
    <path d="M660,208 Q670,208 670,135" fill="none" stroke="#a1245a" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- STEP 3: Model -> Harness (ACCENT - berry) -->
  <g id="step3">
    <circle cx="688" cy="256" r="9" fill="#a1245a"/>
    <text x="688" y="259.5" text-anchor="middle" class="step-num">3</text>
    <line x1="676" y1="256" x2="392" y2="256" stroke="#a1245a" stroke-width="1.8" marker-end="url(#arr-accent)"/>
    <text x="537" y="248" text-anchor="middle" class="mono label-accent" font-size="8.5">query_crm({customer:"Rossi SpA", order:"A-7842"})</text>
  </g>

  <!-- STEP 4: Harness -> CRM (muted) -->
  <g id="step4">
    <circle cx="392" cy="304" r="9" fill="#838383"/>
    <text x="392" y="307.5" text-anchor="middle" class="step-num">4</text>
    <line x1="404" y1="304" x2="968" y2="304" stroke="#838383" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arr-muted)"/>
    <text x="686" y="296" text-anchor="middle" font-size="9" fill="#838383" font-style="italic">query</text>
  </g>

  <!-- STEP 5: CRM -> Harness (ACCENT - berry) -->
  <g id="step5">
    <circle cx="968" cy="352" r="9" fill="#a1245a"/>
    <text x="968" y="355.5" text-anchor="middle" class="step-num">5</text>
    <line x1="956" y1="352" x2="392" y2="352" stroke="#a1245a" stroke-width="1.8" marker-end="url(#arr-accent)"/>
    <text x="674" y="344" text-anchor="middle" class="mono label-accent" font-size="8.5">{shipped, eta: 16/04, DHL 1234567890}</text>
  </g>

  <!-- STEP 6: Harness -> Model (muted) -->
  <g id="step6">
    <circle cx="392" cy="400" r="9" fill="#838383"/>
    <text x="392" y="403.5" text-anchor="middle" class="step-num">6</text>
    <line x1="404" y1="400" x2="688" y2="400" stroke="#838383" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arr-muted)"/>
    <text x="546" y="392" text-anchor="middle" font-size="9" fill="#838383" font-style="italic">tool result</text>
  </g>

  <!-- STEP 7: Model -> Harness (dark) -->
  <g id="step7">
    <circle cx="688" cy="440" r="9" fill="#1a1a1a"/>
    <text x="688" y="443.5" text-anchor="middle" class="step-num">7</text>
    <line x1="676" y1="440" x2="392" y2="440" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arr-dark)"/>
    <text x="537" y="432" text-anchor="middle" font-size="9" fill="#1a1a1a" font-style="italic">"L'ordine è in spedizione..."</text>
  </g>

  <!-- STEP 8: Harness -> User (dark) -->
  <g id="step8">
    <circle cx="368" cy="478" r="9" fill="#1a1a1a"/>
    <text x="368" y="481.5" text-anchor="middle" class="step-num">8</text>
    <line x1="356" y1="478" x2="122" y2="478" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arr-dark)"/>
    <text x="239" y="470" text-anchor="middle" font-size="9" fill="#1a1a1a" font-style="italic">risposta finale</text>
  </g>
</svg>
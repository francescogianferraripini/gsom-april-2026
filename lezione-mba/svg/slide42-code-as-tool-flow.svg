<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <title>Code as tool — 6 step flow con riquadro "invisibile all'utente" attorno agli step 2-5</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .step-num { font-size: 9px; fill: #838383; font-weight: 600; letter-spacing: 0.12em; }
      .step-num-accent { font-size: 9px; fill: #a1245a; font-weight: 600; letter-spacing: 0.12em; }
      .box-label { font-size: 12px; fill: #1a1a1a; font-weight: 600; }
      .box-sub { font-size: 9.5px; fill: #838383; }
      .frame-label { font-size: 11px; fill: #a1245a; font-weight: 600; font-style: italic; letter-spacing: 0.05em; }
      .interface-label { font-size: 10px; fill: #1ab197; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    </style>
    <marker id="ct-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="1200" height="320" fill="#ffffff"/>

  <!-- Dashed frame around steps 2-5: "invisibile all'utente" -->
  <rect x="200" y="70" width="680" height="180" rx="10" fill="rgba(161,36,90,0.035)" stroke="#a1245a" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="540" y="62" text-anchor="middle" class="frame-label">invisibile all'utente</text>

  <!-- =============== STEP 1 — visible =============== -->
  <g>
    <text x="95" y="95" text-anchor="middle" class="step-num-accent">STEP 1</text>
    <text x="95" y="55" text-anchor="middle" class="interface-label">utente</text>
    <rect x="25" y="105" width="140" height="70" rx="8" fill="#fafafa" stroke="#1ab197" stroke-width="1.6"/>
    <text x="95" y="134" text-anchor="middle" class="box-label">Riceve task</text>
    <text x="95" y="152" text-anchor="middle" class="box-sub">richiesta in</text>
    <text x="95" y="165" text-anchor="middle" class="box-sub">linguaggio naturale</text>
  </g>

  <line x1="167" y1="140" x2="218" y2="140" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ct-arr)"/>

  <!-- =============== STEP 2 =============== -->
  <g>
    <text x="285" y="95" text-anchor="middle" class="step-num">STEP 2</text>
    <rect x="220" y="105" width="130" height="70" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1.3"/>
    <text x="285" y="134" text-anchor="middle" class="box-label">Decide</text>
    <text x="285" y="152" text-anchor="middle" class="box-sub">serve codice</text>
    <text x="285" y="165" text-anchor="middle" class="box-sub">per il task</text>
  </g>

  <line x1="352" y1="140" x2="388" y2="140" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ct-arr)"/>

  <!-- =============== STEP 3 =============== -->
  <g>
    <text x="455" y="95" text-anchor="middle" class="step-num">STEP 3</text>
    <rect x="390" y="105" width="130" height="70" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1.3"/>
    <text x="455" y="134" text-anchor="middle" class="box-label">Scrive script</text>
    <text x="455" y="152" text-anchor="middle" class="mono" font-size="9.5" fill="#838383">Python / SQL</text>
  </g>

  <line x1="522" y1="140" x2="558" y2="140" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ct-arr)"/>

  <!-- =============== STEP 4 =============== -->
  <g>
    <text x="625" y="95" text-anchor="middle" class="step-num">STEP 4</text>
    <rect x="560" y="105" width="130" height="70" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1.3"/>
    <text x="625" y="134" text-anchor="middle" class="box-label">Esegue</text>
    <text x="625" y="152" text-anchor="middle" class="box-sub">in sandbox</text>
  </g>

  <line x1="692" y1="140" x2="728" y2="140" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ct-arr)"/>

  <!-- =============== STEP 5 =============== -->
  <g>
    <text x="795" y="95" text-anchor="middle" class="step-num">STEP 5</text>
    <rect x="730" y="105" width="130" height="70" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1.3"/>
    <text x="795" y="134" text-anchor="middle" class="box-label">Legge output</text>
    <text x="795" y="152" text-anchor="middle" class="box-sub">risultato</text>
    <text x="795" y="165" text-anchor="middle" class="box-sub">dell'esecuzione</text>
  </g>

  <line x1="862" y1="140" x2="918" y2="140" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ct-arr)"/>

  <!-- =============== STEP 6 — visible =============== -->
  <g>
    <text x="998" y="95" text-anchor="middle" class="step-num-accent">STEP 6</text>
    <text x="998" y="55" text-anchor="middle" class="interface-label">utente</text>
    <rect x="920" y="105" width="155" height="70" rx="8" fill="#fafafa" stroke="#1ab197" stroke-width="1.6"/>
    <text x="998" y="134" text-anchor="middle" class="box-label">Risponde</text>
    <text x="998" y="152" text-anchor="middle" class="box-sub">in linguaggio</text>
    <text x="998" y="165" text-anchor="middle" class="box-sub">naturale</text>
  </g>

  <!-- Bottom caption for the dashed frame -->
  <text x="540" y="275" text-anchor="middle" font-family="Poppins" font-size="10.5" fill="#838383" font-style="italic">l'agente vede codice ed esecuzione · l'utente vede solo la risposta</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 360" preserveAspectRatio="xMidYMid meet">
  <title>I quattro loop in un colpo d'occhio: atomico, conversazionale, con tool, con codice</title>

  <defs>
    <marker id="ar-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#838383"/>
    </marker>
    <marker id="ar-a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#a1245a"/>
    </marker>
    <marker id="ar-s" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#1ab197"/>
    </marker>
    <marker id="ar-big" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#cccccc"/>
    </marker>
  </defs>

  <style>
    .cap { font-family: 'Poppins', sans-serif; font-size: 9.5px; fill: #838383; }
    .num { font-family: 'Poppins', sans-serif; font-size: 10.5px; fill: #a1245a; font-weight: 700; letter-spacing: 1.5px; }
    .ttl { font-family: 'Poppins', sans-serif; font-size: 14px; fill: #1a1a1a; font-weight: 600; }
    .nv  { font-family: 'Poppins', sans-serif; font-size: 10px; fill: #a1245a; font-style: italic; }
    .box { font-family: system-ui, sans-serif; font-size: 9.5px; fill: #1a1a1a; }
    .mut { font-family: system-ui, sans-serif; font-size: 9px; fill: #838383; }
  </style>

  <!-- ============================================ -->
  <!-- MINI 1 — Atomico (token) — x: 20..290        -->
  <!-- ============================================ -->
  <g transform="translate(20, 0)">
    <text x="135" y="28" text-anchor="middle" class="num">1/4 · ATOMICO</text>
    <text x="135" y="50" text-anchor="middle" class="ttl">token per token</text>

    <!-- LLM box -->
    <rect x="25" y="130" width="80" height="60" rx="6" fill="#f5f5f5" stroke="#a1245a" stroke-width="1.8"/>
    <text x="65" y="165" text-anchor="middle" class="box" font-weight="600">LLM</text>

    <!-- Tokens coming out -->
    <line x1="110" y1="160" x2="135" y2="160" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <rect x="140" y="150" width="36" height="22" rx="3" fill="#f7f7f7" stroke="#dddddd" stroke-width="1"/>
    <text x="158" y="165" text-anchor="middle" class="box">tok</text>

    <line x1="180" y1="160" x2="200" y2="160" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <rect x="205" y="150" width="36" height="22" rx="3" fill="#f7f7f7" stroke="#dddddd" stroke-width="1"/>
    <text x="223" y="165" text-anchor="middle" class="box">tok</text>

    <text x="245" y="165" class="mut">…</text>

    <text x="135" y="220" text-anchor="middle" class="cap">una distribuzione di probabilità</text>
    <text x="135" y="234" text-anchor="middle" class="cap">su ogni prossimo token</text>

    <text x="135" y="300" text-anchor="middle" class="nv">genera un token alla volta</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="295" y1="165" x2="325" y2="165" stroke="#cccccc" stroke-width="2" marker-end="url(#ar-big)"/>

  <!-- ============================================ -->
  <!-- MINI 2 — Conversazionale — x: 330..600       -->
  <!-- ============================================ -->
  <g transform="translate(330, 0)">
    <text x="135" y="28" text-anchor="middle" class="num">2/4 · CONVERSAZIONALE</text>
    <text x="135" y="50" text-anchor="middle" class="ttl">turno per turno</text>

    <!-- Triangle: Utente (top) → Modello (bottom-right) → Contesto (bottom-left) → Utente -->
    <!-- Utente -->
    <rect x="95" y="80" width="80" height="32" rx="6" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="135" y="100" text-anchor="middle" class="box">Utente</text>

    <!-- Modello (accent) -->
    <rect x="165" y="180" width="80" height="32" rx="6" fill="#f5f5f5" stroke="#a1245a" stroke-width="1.8"/>
    <text x="205" y="200" text-anchor="middle" class="box" font-weight="600">Modello</text>

    <!-- Contesto -->
    <rect x="25" y="180" width="80" height="32" rx="6" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="65" y="200" text-anchor="middle" class="box">Contesto</text>

    <!-- Arrows: Utente → Contesto, Contesto → Modello, Modello → Utente -->
    <line x1="120" y1="115" x2="80" y2="177" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="105" y1="196" x2="163" y2="196" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="190" y1="177" x2="150" y2="115" stroke="#a1245a" stroke-width="2" marker-end="url(#ar-a)"/>

    <text x="135" y="255" text-anchor="middle" class="cap">il contesto cresce ad ogni giro</text>

    <text x="135" y="300" text-anchor="middle" class="nv">statelessness + system prompt</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="605" y1="165" x2="635" y2="165" stroke="#cccccc" stroke-width="2" marker-end="url(#ar-big)"/>

  <!-- ============================================ -->
  <!-- MINI 3 — Con tool — x: 640..910              -->
  <!-- ============================================ -->
  <g transform="translate(640, 0)">
    <text x="135" y="28" text-anchor="middle" class="num">3/4 · CON TOOL</text>
    <text x="135" y="50" text-anchor="middle" class="ttl">decidi, agisci, osserva</text>

    <!-- Same triangle as mini 2 -->
    <rect x="75" y="80" width="80" height="32" rx="6" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="115" y="100" text-anchor="middle" class="box">Utente</text>

    <rect x="135" y="180" width="80" height="32" rx="6" fill="#f5f5f5" stroke="#a1245a" stroke-width="1.8"/>
    <text x="175" y="200" text-anchor="middle" class="box" font-weight="600">Modello</text>

    <rect x="10" y="180" width="80" height="32" rx="6" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="50" y="200" text-anchor="middle" class="box">Contesto</text>

    <line x1="100" y1="115" x2="65" y2="177" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="90" y1="196" x2="133" y2="196" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="160" y1="177" x2="130" y2="115" stroke="#a1245a" stroke-width="2" marker-end="url(#ar-a)"/>

    <!-- Tool sub-loop on the Modello node (to the right, teal) -->
    <rect x="235" y="182" width="40" height="30" rx="5" fill="#f7f7f7" stroke="#1ab197" stroke-width="1.5"/>
    <text x="255" y="201" text-anchor="middle" class="box" fill="#1ab197">tool</text>

    <!-- Out: Modello → tool -->
    <path d="M215,191 Q225,185 235,190" fill="none" stroke="#1ab197" stroke-width="1.5" marker-end="url(#ar-s)"/>
    <!-- Back: tool → Modello (dashed) -->
    <path d="M235,204 Q225,215 215,208" fill="none" stroke="#1ab197" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#ar-s)"/>

    <text x="255" y="230" text-anchor="middle" class="cap" fill="#1ab197" font-style="italic">N volte</text>

    <text x="135" y="300" text-anchor="middle" class="nv">il modello decide cosa fare</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="915" y1="165" x2="945" y2="165" stroke="#cccccc" stroke-width="2" marker-end="url(#ar-big)"/>

  <!-- ============================================ -->
  <!-- MINI 4 — Con codice — x: 950..1195           -->
  <!-- ============================================ -->
  <g transform="translate(950, 0)">
    <text x="125" y="28" text-anchor="middle" class="num">4/4 · CON CODICE</text>
    <text x="125" y="50" text-anchor="middle" class="ttl">scrivi, esegui, verifica</text>

    <!-- Diamond: Task(top) → Scrivi(right) → Esegui(bottom) → Verifica(left, accent) -->
    <rect x="80" y="75" width="90" height="28" rx="5" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="125" y="94" text-anchor="middle" class="box">Task</text>

    <rect x="175" y="145" width="70" height="28" rx="5" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="210" y="164" text-anchor="middle" class="box">Scrivi</text>

    <rect x="80" y="215" width="90" height="28" rx="5" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.3"/>
    <text x="125" y="234" text-anchor="middle" class="box">Esegui</text>

    <rect x="5" y="145" width="70" height="28" rx="5" fill="#f5f5f5" stroke="#a1245a" stroke-width="1.8"/>
    <text x="40" y="164" text-anchor="middle" class="box" font-weight="600">Verifica</text>

    <!-- Forward arrows clockwise -->
    <line x1="168" y1="103" x2="180" y2="145" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="182" y1="173" x2="168" y2="215" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>
    <line x1="82" y1="215" x2="68" y2="173" stroke="#838383" stroke-width="1.5" marker-end="url(#ar-g)"/>

    <!-- Fail feedback arrow: Verifica → Scrivi (accent, across) -->
    <line x1="78" y1="159" x2="173" y2="159" stroke="#a1245a" stroke-width="2.2" marker-end="url(#ar-a)"/>
    <text x="125" y="154" text-anchor="middle" class="cap" fill="#a1245a" font-style="italic">feedback fail</text>

    <text x="125" y="300" text-anchor="middle" class="nv">si corregge da solo</text>
  </g>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <title>Eval loop artigianale: umano crea test set, umano valuta output</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#838383"/>
    </marker>
    <marker id="arrow-accent" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#a1245a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Eval artigianale — tutto umano</text>

  <!-- Box 1: Umano crea test set -->
  <rect x="40" y="90" width="210" height="80" rx="10" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
  <text x="145" y="124" text-anchor="middle" font-size="22">👤</text>
  <text x="145" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Umano</text>
  <text x="145" y="163" text-anchor="middle" font-size="11" fill="#838383">crea il test set</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="130" x2="340" y2="130" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Agente sotto test -->
  <rect x="340" y="90" width="220" height="80" rx="10" fill="#f5f5f5" stroke="#a1245a" stroke-width="2"/>
  <text x="450" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Agente sotto test</text>
  <text x="450" y="145" text-anchor="middle" font-size="11" fill="#838383">produce output</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="130" x2="650" y2="130" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: Umano valuta output -->
  <rect x="650" y="90" width="210" height="80" rx="10" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
  <text x="755" y="124" text-anchor="middle" font-size="22">👤</text>
  <text x="755" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Umano</text>
  <text x="755" y="163" text-anchor="middle" font-size="11" fill="#838383">valuta (scoring manuale)</text>

  <!-- Loopback arc from box 3 back to box 1 -->
  <path d="M755,170 C755,245 145,245 145,170" fill="none" stroke="#a1245a" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-accent)"/>
  <text x="450" y="235" text-anchor="middle" font-size="11" fill="#a1245a" font-style="italic">iterazione manuale — non scala</text>
</svg>

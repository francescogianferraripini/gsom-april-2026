<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <title>Loop agentico: il ciclo di tool-calling con punto di decisione</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#838383"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#a1245a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="white"/>

  <!-- 1. User input -->
  <rect x="30" y="70" width="140" height="50" rx="12" ry="12"
        fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" fill="#1a1a1a"
        font-size="14" font-weight="500">User input</text>

  <!-- Arrow: User input -> Diamond -->
  <line x1="170" y1="95" x2="290" y2="95"
        stroke="#838383" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Diamond: Modello decide -->
  <polygon points="370,95 300,55 370,15 440,55" transform="translate(0,40)"
           fill="none" stroke="#a1245a" stroke-width="2.5"/>
  <text x="370" y="98" text-anchor="middle" fill="#1a1a1a"
        font-size="13" font-weight="600">Modello</text>
  <text x="370" y="114" text-anchor="middle" fill="#1a1a1a"
        font-size="13" font-weight="600">decide</text>

  <!-- Branch A: Right arrow to Risposta finale -->
  <line x1="440" y1="95" x2="600" y2="95"
        stroke="#838383" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="84" text-anchor="middle" fill="#838383"
        font-size="11" font-weight="400">Rispondi all'utente</text>

  <!-- Risposta finale -->
  <rect x="610" y="70" width="160" height="50" rx="12" ry="12"
        fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <text x="690" y="100" text-anchor="middle" fill="#1a1a1a"
        font-size="14" font-weight="500">Risposta finale</text>

  <!-- End dot -->
  <circle cx="800" cy="95" r="8" fill="#1a1a1a"/>
  <circle cx="800" cy="95" r="4" fill="white"/>
  <line x1="770" y1="95" x2="790" y2="95"
        stroke="#838383" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Branch B: Down from diamond -->
  <line x1="370" y1="135" x2="370" y2="195"
        stroke="#838383" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="382" y="168" text-anchor="start" fill="#838383"
        font-size="11" font-weight="400">Emetti tool call</text>

  <!-- Harness esegue tool -->
  <rect x="290" y="205" width="160" height="46" rx="8" ry="8"
        fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="370" y="233" text-anchor="middle" fill="#1a1a1a"
        font-size="13" font-weight="500">Harness esegue tool</text>

  <!-- Arrow down to Tool result -->
  <line x1="370" y1="251" x2="370" y2="278"
        stroke="#838383" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tool result nel contesto -->
  <rect x="275" y="288" width="190" height="46" rx="8" ry="8"
        fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="370" y="316" text-anchor="middle" fill="#1a1a1a"
        font-size="13" font-weight="500">Tool result nel contesto</text>

  <!-- Loop-back arrow: from Tool result, left, then up, then right back to diamond -->
  <path d="M 275,311 L 200,311 L 200,95 L 290,95"
        fill="none" stroke="#a1245a" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrow-accent)"/>

  <!-- Loop label "N volte" -->
  <text x="188" y="215" text-anchor="end" fill="#a1245a"
        font-size="13" font-weight="600" font-style="italic">N volte</text>
</svg>
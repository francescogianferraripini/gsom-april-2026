<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160">
  <title>Mini-scala a 3 gradini: RAG (pattern) → Search-as-a-tool (tool) → Deep Research (sistema agentico)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .meta { font-size: 10px; fill: #838383; font-style: italic; text-transform: uppercase; letter-spacing: 0.08em; }
      .name { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
      .name-accent { font-size: 13px; fill: #a1245a; font-weight: 600; }
    </style>
  </defs>

  <rect width="900" height="160" fill="#ffffff"/>

  <!-- Step 1: RAG — lowest -->
  <g>
    <rect x="70" y="105" width="220" height="40" fill="none" stroke="#c9c9c9" stroke-width="1.2"/>
    <text x="180" y="92" text-anchor="middle" class="name">RAG</text>
    <text x="180" y="130" text-anchor="middle" class="meta">pattern architetturale</text>
  </g>

  <!-- Step 2: Search-as-a-tool — middle -->
  <g>
    <rect x="340" y="75" width="220" height="70" fill="none" stroke="#a6a6a6" stroke-width="1.2"/>
    <text x="450" y="62" text-anchor="middle" class="name">Search-as-a-tool</text>
    <text x="450" y="118" text-anchor="middle" class="meta">tool</text>
  </g>

  <!-- Step 3: Deep Research — highest (accent) -->
  <g>
    <rect x="610" y="40" width="220" height="105" fill="rgba(161,36,90,0.05)" stroke="#a1245a" stroke-width="1.6"/>
    <text x="720" y="28" text-anchor="middle" class="name-accent">Deep Research</text>
    <text x="720" y="100" text-anchor="middle" class="meta" style="fill: #a1245a;">sistema agentico</text>
  </g>

  <!-- Ground line -->
  <line x1="50" y1="145" x2="850" y2="145" stroke="#1a1a1a" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260">
  <title>MCP — 3 step: discovery (list_tools), schema return, iniezione nel system prompt</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .step-num { font-size: 10px; fill: #a1245a; font-weight: 600; letter-spacing: 0.12em; }
      .box-label { font-size: 12px; fill: #1a1a1a; font-weight: 600; }
      .arrow-label { font-size: 10px; fill: #a1245a; font-weight: 500; font-style: italic; }
      .note { font-size: 9.5px; fill: #838383; font-style: italic; }
    </style>
    <marker id="mcp-arr-accent" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#a1245a"/>
    </marker>
    <marker id="mcp-arr-dark" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="1200" height="260" fill="#ffffff"/>

  <!-- ================= STEP 1 ================= -->
  <g>
    <text x="180" y="24" text-anchor="middle" class="step-num">STEP 1 · DISCOVERY</text>

    <!-- Harness box -->
    <rect x="30" y="90" width="130" height="60" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.3"/>
    <text x="95" y="125" text-anchor="middle" class="box-label">Harness</text>

    <!-- Arrow -->
    <line x1="162" y1="120" x2="238" y2="120" stroke="#a1245a" stroke-width="1.6" marker-end="url(#mcp-arr-accent)"/>
    <text x="200" y="110" text-anchor="middle" class="mono arrow-label">list_tools()</text>

    <!-- Server MCP box -->
    <rect x="240" y="90" width="130" height="60" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.3"/>
    <text x="305" y="121" text-anchor="middle" class="box-label">Server MCP</text>
    <text x="305" y="138" text-anchor="middle" class="note">(GitHub, Linear…)</text>
  </g>

  <!-- Separator -->
  <line x1="395" y1="40" x2="395" y2="220" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ================= STEP 2 ================= -->
  <g>
    <text x="555" y="24" text-anchor="middle" class="step-num">STEP 2 · SCHEMA</text>

    <!-- Server MCP box -->
    <rect x="420" y="90" width="130" height="60" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.3"/>
    <text x="485" y="125" text-anchor="middle" class="box-label">Server MCP</text>

    <!-- Arrow -->
    <line x1="552" y1="120" x2="628" y2="120" stroke="#a1245a" stroke-width="1.6" marker-end="url(#mcp-arr-accent)"/>
    <text x="590" y="110" text-anchor="middle" class="arrow-label">schema dei tool</text>
    <text x="590" y="145" text-anchor="middle" class="note">(name, description,</text>
    <text x="590" y="158" text-anchor="middle" class="note">input_schema)</text>

    <!-- Harness box -->
    <rect x="630" y="90" width="130" height="60" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.3"/>
    <text x="695" y="125" text-anchor="middle" class="box-label">Harness</text>
  </g>

  <!-- Separator -->
  <line x1="790" y1="40" x2="790" y2="220" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ================= STEP 3 ================= -->
  <g>
    <text x="995" y="24" text-anchor="middle" class="step-num">STEP 3 · INIEZIONE</text>

    <!-- Harness box -->
    <rect x="820" y="90" width="110" height="60" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.3"/>
    <text x="875" y="125" text-anchor="middle" class="box-label">Harness</text>

    <!-- Arrow -->
    <line x1="932" y1="120" x2="998" y2="120" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#mcp-arr-dark)"/>
    <text x="965" y="110" text-anchor="middle" class="note" style="fill:#1a1a1a;">iniezione</text>

    <!-- System prompt document (larger) -->
    <rect x="1000" y="60" width="160" height="130" rx="4" fill="rgba(161,36,90,0.04)" stroke="#a1245a" stroke-width="1.3"/>
    <text x="1080" y="78" text-anchor="middle" font-size="10" fill="#a1245a" font-weight="600">system prompt</text>
    <!-- tool definition lines -->
    <rect x="1012" y="88" width="136" height="14" rx="2" fill="rgba(161,36,90,0.1)"/>
    <text x="1080" y="99" text-anchor="middle" class="mono" font-size="9" fill="#a1245a">tool: get_issue</text>
    <rect x="1012" y="106" width="136" height="14" rx="2" fill="rgba(161,36,90,0.1)"/>
    <text x="1080" y="117" text-anchor="middle" class="mono" font-size="9" fill="#a1245a">tool: create_pr</text>
    <rect x="1012" y="124" width="136" height="14" rx="2" fill="rgba(161,36,90,0.1)"/>
    <text x="1080" y="135" text-anchor="middle" class="mono" font-size="9" fill="#a1245a">tool: list_repos</text>
    <rect x="1012" y="142" width="136" height="14" rx="2" fill="rgba(161,36,90,0.1)"/>
    <text x="1080" y="153" text-anchor="middle" class="mono" font-size="9" fill="#a1245a">tool: …</text>

    <text x="1080" y="182" text-anchor="middle" class="note" style="fill:#a1245a;">restano qui per tutta la sessione</text>
  </g>
</svg>

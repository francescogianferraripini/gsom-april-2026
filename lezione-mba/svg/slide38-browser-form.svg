<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440">
  <title>Browser use: agente compila form "Nuovo ticket" — sequenza di azioni click/type/select</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .form-title { font-size: 14px; fill: #1a1a1a; font-weight: 600; }
      .field-label { font-size: 10px; fill: #838383; font-weight: 500; }
      .field-value { font-size: 11px; fill: #1a1a1a; }
      .step-num { font-size: 9px; fill: #fff; font-weight: 600; }
      .step-text { font-size: 10px; fill: #1a1a1a; }
      .step-mono { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: #a1245a; }
    </style>
    <marker id="br-arr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#c9c9c9"/>
    </marker>
  </defs>

  <rect width="760" height="440" fill="#ffffff"/>

  <!-- ============ FORM MOCKUP (LEFT) ============ -->
  <g>
    <!-- Browser window chrome -->
    <rect x="30" y="30" width="400" height="380" rx="6" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
    <rect x="30" y="30" width="400" height="28" rx="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1"/>
    <circle cx="46" cy="44" r="4" fill="#e0e0e0"/>
    <circle cx="60" cy="44" r="4" fill="#e0e0e0"/>
    <circle cx="74" cy="44" r="4" fill="#e0e0e0"/>
    <rect x="100" y="37" width="320" height="14" rx="3" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.8"/>
    <text x="108" y="47" font-size="8" fill="#838383">support.internal/nuovo-ticket</text>

    <!-- Form title -->
    <text x="60" y="88" class="form-title">Nuovo ticket di supporto</text>

    <!-- Field: Titolo -->
    <text x="60" y="120" class="field-label">TITOLO</text>
    <rect x="60" y="126" width="340" height="32" rx="4" fill="#ffffff" stroke="#a1245a" stroke-width="1.5"/>
    <text x="72" y="146" class="field-value">Malfunzionamento stampante</text>
    <!-- cursor -->
    <line x1="258" y1="134" x2="258" y2="150" stroke="#1a1a1a" stroke-width="1.2"/>

    <!-- Field: Priorità (dropdown open) -->
    <text x="60" y="182" class="field-label">PRIORITÀ</text>
    <rect x="60" y="188" width="180" height="32" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
    <text x="72" y="208" class="field-value">Alta</text>
    <!-- dropdown chevron -->
    <path d="M220,200 L228,210 L236,200" fill="none" stroke="#838383" stroke-width="1.2"/>
    <!-- dropdown menu -->
    <rect x="60" y="222" width="180" height="78" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
    <rect x="60" y="222" width="180" height="26" fill="#fafafa"/>
    <text x="72" y="239" class="field-value">Bassa</text>
    <rect x="60" y="248" width="180" height="26" fill="#fafafa"/>
    <text x="72" y="265" class="field-value">Media</text>
    <!-- Selected Alta -->
    <rect x="60" y="274" width="180" height="26" fill="rgba(161,36,90,0.1)"/>
    <text x="72" y="291" class="field-value" style="fill:#a1245a;font-weight:600;">Alta</text>

    <!-- Mouse cursor on dropdown option -->
    <g transform="translate(196,284)">
      <path d="M0,0 L0,16 L4,13 L7,19 L10,18 L7,12 L12,12 Z" fill="#1a1a1a" stroke="#fff" stroke-width="0.8"/>
    </g>

    <!-- Field: Descrizione -->
    <text x="60" y="324" class="field-label">DESCRIZIONE</text>
    <rect x="60" y="330" width="340" height="44" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>

    <!-- Submit -->
    <rect x="60" y="385" width="90" height="22" rx="4" fill="#1a1a1a"/>
    <text x="105" y="400" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Invia</text>
  </g>

  <!-- ============ ANNOTATIONS (RIGHT) ============ -->
  <g>
    <text x="460" y="52" class="step-num" style="fill:#a1245a;font-weight:600;font-style:italic;">azioni dell'agente</text>

    <!-- Step 1 -->
    <circle cx="472" cy="110" r="11" fill="#a1245a"/>
    <text x="472" y="114" text-anchor="middle" class="step-num">1</text>
    <text x="492" y="107" class="step-text">click sul campo</text>
    <text x="492" y="121" class="step-text">Titolo</text>
    <!-- connector arrow -->
    <line x1="460" y1="112" x2="400" y2="142" stroke="#c9c9c9" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#br-arr)"/>

    <!-- Step 2 -->
    <circle cx="472" cy="170" r="11" fill="#a1245a"/>
    <text x="472" y="174" text-anchor="middle" class="step-num">2</text>
    <text x="492" y="167" class="step-mono">type: "Malfunzionamento</text>
    <text x="492" y="181" class="step-mono">stampante"</text>
    <line x1="460" y1="165" x2="260" y2="145" stroke="#c9c9c9" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#br-arr)"/>

    <!-- Step 3 -->
    <circle cx="472" cy="230" r="11" fill="#a1245a"/>
    <text x="472" y="234" text-anchor="middle" class="step-num">3</text>
    <text x="492" y="227" class="step-text">click sul dropdown</text>
    <text x="492" y="241" class="step-text">Priorità</text>
    <line x1="460" y1="225" x2="240" y2="205" stroke="#c9c9c9" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#br-arr)"/>

    <!-- Step 4 -->
    <circle cx="472" cy="290" r="11" fill="#a1245a"/>
    <text x="472" y="294" text-anchor="middle" class="step-num">4</text>
    <text x="492" y="287" class="step-mono">select: "Alta"</text>
    <line x1="460" y1="290" x2="245" y2="288" stroke="#c9c9c9" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#br-arr)"/>
  </g>
</svg>

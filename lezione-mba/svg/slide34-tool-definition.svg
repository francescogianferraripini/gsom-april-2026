<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380">
  <title>Anatomia di una tool definition JSON: name, description, input_schema annotati</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      .json-key { fill: #a1245a; }
      .json-string { fill: #1a1a1a; }
      .json-punct { fill: #838383; }
      .annot-label { font-size: 10.5px; fill: #1a1a1a; font-weight: 600; }
      .annot-text { font-size: 10px; fill: #838383; font-style: italic; }
    </style>
    <marker id="api-arr" markerWidth="6" markerHeight="5" refX="0" refY="2.5" orient="auto-start-reverse">
      <path d="M6,0 L0,2.5 L6,5" fill="#a1245a" />
    </marker>
  </defs>

  <rect width="620" height="380" fill="#ffffff"/>

  <!-- JSON box -->
  <rect x="20" y="20" width="340" height="340" rx="6" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- JSON content -->
  <g>
    <text x="38" y="48" class="mono json-punct">{</text>

    <!-- name -->
    <text x="52" y="72" class="mono">
      <tspan class="json-key">"name"</tspan><tspan class="json-punct">: </tspan><tspan class="json-string">"get_customer"</tspan><tspan class="json-punct">,</tspan>
    </text>

    <!-- description -->
    <text x="52" y="100" class="mono">
      <tspan class="json-key">"description"</tspan><tspan class="json-punct">: </tspan>
    </text>
    <text x="52" y="118" class="mono">
      <tspan class="json-string">  "Retrieve customer data</tspan>
    </text>
    <text x="52" y="136" class="mono">
      <tspan class="json-string">   by ID from the CRM."</tspan><tspan class="json-punct">,</tspan>
    </text>

    <!-- input_schema -->
    <text x="52" y="164" class="mono">
      <tspan class="json-key">"input_schema"</tspan><tspan class="json-punct">: {</tspan>
    </text>
    <text x="66" y="184" class="mono">
      <tspan class="json-key">"type"</tspan><tspan class="json-punct">: </tspan><tspan class="json-string">"object"</tspan><tspan class="json-punct">,</tspan>
    </text>
    <text x="66" y="204" class="mono">
      <tspan class="json-key">"properties"</tspan><tspan class="json-punct">: {</tspan>
    </text>
    <text x="80" y="224" class="mono">
      <tspan class="json-key">"customer_id"</tspan><tspan class="json-punct">: {</tspan>
    </text>
    <text x="94" y="244" class="mono">
      <tspan class="json-key">"type"</tspan><tspan class="json-punct">: </tspan><tspan class="json-string">"string"</tspan><tspan class="json-punct">,</tspan>
    </text>
    <text x="94" y="264" class="mono">
      <tspan class="json-key">"description"</tspan><tspan class="json-punct">: </tspan><tspan class="json-string">"…"</tspan>
    </text>
    <text x="80" y="284" class="mono json-punct">}</text>
    <text x="66" y="304" class="mono json-punct">},</text>
    <text x="66" y="324" class="mono">
      <tspan class="json-key">"required"</tspan><tspan class="json-punct">: [</tspan><tspan class="json-string">"customer_id"</tspan><tspan class="json-punct">]</tspan>
    </text>
    <text x="52" y="344" class="mono json-punct">}</text>
    <text x="38" y="358" class="mono json-punct">}</text>
  </g>

  <!-- Annotations -->
  <!-- name -->
  <g>
    <line x1="146" y1="68" x2="400" y2="60" stroke="#a1245a" stroke-width="0.8" marker-end="url(#api-arr)"/>
    <text x="408" y="54" class="annot-label">name</text>
    <text x="408" y="70" class="annot-text">come l'agente lo chiama</text>
  </g>

  <!-- description -->
  <g>
    <line x1="172" y1="100" x2="400" y2="160" stroke="#a1245a" stroke-width="0.8" marker-end="url(#api-arr)"/>
    <text x="408" y="154" class="annot-label">description</text>
    <text x="408" y="170" class="annot-text">su questo testo l'agente</text>
    <text x="408" y="184" class="annot-text">decide se usarlo</text>
  </g>

  <!-- input_schema -->
  <g>
    <line x1="196" y1="164" x2="400" y2="266" stroke="#a1245a" stroke-width="0.8" marker-end="url(#api-arr)"/>
    <text x="408" y="260" class="annot-label">input_schema</text>
    <text x="408" y="276" class="annot-text">parametri tipizzati</text>
  </g>
</svg>

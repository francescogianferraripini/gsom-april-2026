<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 420">
  <title>Ciclo conversazionale con traiettoria esterna</title>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#838383"/>
    </marker>
    <marker id="arrow-accent" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#a1245a"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#838383"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- 5-NODE LOOP (pentagon, centered at 400,210)  -->
  <!-- Pentagon vertices (r=160):                   -->
  <!--   1: top          (400, 50)                  -->
  <!--   2: upper-right  (552, 168)                 -->
  <!--   3: lower-right  (494, 340)                 -->
  <!--   4: lower-left   (306, 340)                 -->
  <!--   5: upper-left   (248, 168)                 -->
  <!-- ============================================ -->

  <!-- Node 1: Utente scrive — top -->
  <g id="node1">
    <rect x="310" y="22" width="180" height="56" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
    <text x="400" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a">Utente scrive</text>
    <text x="400" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#838383">nuovo messaggio</text>
  </g>

  <!-- Node 2: Client costruisce contesto — upper right -->
  <g id="node2">
    <rect x="530" y="128" width="190" height="62" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
    <text x="625" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a">Client costruisce contesto</text>
    <text x="625" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#838383">system + storico + input</text>
  </g>

  <!-- Node 3: Modello genera risposta — lower right (ACCENT) -->
  <g id="node3">
    <rect x="460" y="308" width="200" height="56" rx="8" fill="#f5f5f5" stroke="#a1245a" stroke-width="2"/>
    <text x="560" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a">Modello genera risposta</text>
    <text x="560" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#a1245a" opacity="0.7">LLM</text>
  </g>

  <!-- Node 4: Client appende allo storico — lower left -->
  <g id="node4">
    <rect x="148" y="308" width="200" height="62" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
    <text x="248" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a">Client appende allo storico</text>
    <text x="248" y="353" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#838383">storico aggiornato</text>
  </g>

  <!-- Node 5: Utente legge risposta — upper left -->
  <g id="node5">
    <rect x="80" y="134" width="200" height="56" rx="8" fill="#f7f7f7" stroke="#dddddd" stroke-width="1.5"/>
    <text x="180" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a">Utente legge risposta</text>
    <text x="180" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#838383">risposta ricevuta</text>
  </g>

  <!-- ============================================ -->
  <!-- ARROWS (1→2→3→4→5→1)                        -->
  <!-- ============================================ -->

  <!-- Arrow 1→2: top-right edge of node1 to top-left edge of node2 -->
  <line x1="490" y1="65" x2="540" y2="128" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 2→3: bottom of node2 to top-right of node3 -->
  <line x1="620" y1="190" x2="580" y2="308" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 3→4: left of node3 to right of node4 -->
  <line x1="460" y1="336" x2="348" y2="336" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 4→5: top of node4 to bottom of node5 -->
  <line x1="220" y1="308" x2="195" y2="190" stroke="#838383" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 5→1: closing loop — ACCENT, thicker, straight -->
  <line x1="210" y1="134" x2="330" y2="78" stroke="#a1245a" stroke-width="3" marker-end="url(#arrow-accent)"/>

  <!-- Label on closing arrow -->
  <text x="255" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1245a" font-style="italic">ad ogni giro il contesto cresce</text>

  <!-- ============================================ -->
  <!-- CENTER: growing context window               -->
  <!-- ============================================ -->
  <g id="center-context" transform="translate(400, 218)">
    <rect x="-44" y="-30" width="88" height="60" rx="5" fill="none" stroke="#dddddd" stroke-width="1" opacity="0.5"/>
    <rect x="-34" y="-22" width="68" height="44" rx="4" fill="none" stroke="#a1245a" stroke-width="1" opacity="0.35"/>
    <rect x="-24" y="-14" width="48" height="28" rx="3" fill="none" stroke="#a1245a" stroke-width="1.5" opacity="0.6"/>
    <rect x="-14" y="-6" width="28" height="12" rx="2" fill="none" stroke="#a1245a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#838383">contesto</text>
  </g>

  <!-- ============================================ -->
  <!-- TRAIETTORIA PANEL (right side, x=860-1120)   -->
  <!-- ============================================ -->
  <g id="traiettoria">
    <!-- Dashed arrow from node 3 area going right -->
    <path d="M660,326 L780,280 L850,240" stroke="#838383" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-muted)"/>

    <!-- Traiettoria box -->
    <rect x="850" y="120" width="170" height="44" rx="8" fill="#f7f7f7" stroke="#a1245a" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="935" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Traiettoria</text>

    <!-- Branch lines down from Traiettoria box -->
    <line x1="900" y1="164" x2="880" y2="210" stroke="#838383" stroke-width="1.2" stroke-dasharray="4,3"/>
    <line x1="970" y1="164" x2="990" y2="210" stroke="#838383" stroke-width="1.2" stroke-dasharray="4,3"/>

    <!-- Branch A: success (cyan) -->
    <rect x="830" y="214" width="130" height="34" rx="6" fill="#f7f7f7" stroke="#a1245a" stroke-width="1.2"/>
    <text x="895" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1245a">&#x2713; risolto / utile</text>

    <!-- Branch B: failure (orange) -->
    <rect x="970" y="214" width="130" height="34" rx="6" fill="#f7f7f7" stroke="#1ab197" stroke-width="1.2"/>
    <text x="1035" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1ab197">&#x2717; non risolto</text>

    <!-- Footnote -->
    <text x="965" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#838383">&#x2192; carburante per il prossimo training</text>
  </g>
</svg>
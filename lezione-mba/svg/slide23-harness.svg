<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 370">
  <title>Harness: il software che orchestra tutto tra utente e modello LLM</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Poppins', sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#838383"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#a1245a"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#1ab197"/>
    </marker>
  </defs>

  <!-- ========== LEFT: User ========== -->
  <g id="user" transform="translate(70, 115)">
    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Body -->
    <path d="M-28,58 C-28,35 -18,28 0,28 C18,28 28,35 28,58" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Utente</text>
  </g>

  <!-- ========== CENTER: Harness ========== -->
  <g id="harness">
    <rect x="250" y="30" width="380" height="230" rx="14" fill="white" stroke="#a1245a" stroke-width="2.5"/>
    <!-- Label -->
    <text x="440" y="62" text-anchor="middle" font-size="17" font-weight="700" fill="#a1245a">Harness</text>
    <!-- Divider line under label -->
    <line x1="280" y1="74" x2="600" y2="74" stroke="#a1245a" stroke-width="0.8" opacity="0.35"/>

    <!-- Capability rows -->
    <g transform="translate(290, 90)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="280" height="40" rx="6" fill="#f6eef2" stroke="#a1245a" stroke-width="1" opacity="0.7"/>
      <text x="140" y="26" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">Gestisce il contesto</text>

      <!-- Row 2 -->
      <rect x="0" y="50" width="280" height="40" rx="6" fill="#f6eef2" stroke="#a1245a" stroke-width="1" opacity="0.7"/>
      <text x="140" y="76" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">Esegue i tool</text>

      <!-- Row 3 -->
      <rect x="0" y="100" width="280" height="40" rx="6" fill="#f6eef2" stroke="#a1245a" stroke-width="1" opacity="0.7"/>
      <text x="140" y="126" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">Controlla il flusso</text>
    </g>
  </g>

  <!-- ========== RIGHT: LLM Model ========== -->
  <g id="model" transform="translate(730, 100)">
    <rect x="-70" y="0" width="140" height="80" rx="10" fill="#f4f4f4" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Brain/chip icon -->
    <g transform="translate(-12, 16)">
      <rect x="0" y="0" width="24" height="24" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <!-- Chip pins -->
      <line x1="-4" y1="7" x2="0" y2="7" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="-4" y1="17" x2="0" y2="17" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="24" y1="7" x2="28" y2="7" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="24" y1="17" x2="28" y2="17" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="7" y1="-4" x2="7" y2="0" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="17" y1="-4" x2="17" y2="0" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="7" y1="24" x2="7" y2="28" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="17" y1="24" x2="17" y2="28" stroke="#1a1a1a" stroke-width="1.2"/>
      <!-- Inner circle -->
      <circle cx="12" cy="12" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    <text x="0" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Modello LLM</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" font-style="italic" fill="#838383">decide, non esegue</text>
  </g>

  <!-- ========== ARROWS: Top path (user -> harness -> model) ========== -->
  <!-- User -> Harness -->
  <line x1="110" y1="120" x2="245" y2="120" stroke="#838383" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="178" y="112" text-anchor="middle" font-size="10" fill="#838383">richiesta</text>

  <!-- Harness -> Model -->
  <line x1="634" y1="120" x2="656" y2="120" stroke="#838383" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="645" y="110" text-anchor="middle" font-size="9" fill="#838383">contesto</text>
  <text x="645" y="100" text-anchor="middle" font-size="9" fill="#838383">strutturato</text>

  <!-- Model -> Harness -->
  <line x1="656" y1="165" x2="634" y2="165" stroke="#838383" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="645" y="183" text-anchor="middle" font-size="9" fill="#838383">testo o</text>
  <text x="645" y="193" text-anchor="middle" font-size="9" fill="#838383">tool_call</text>

  <!-- Harness -> User -->
  <line x1="245" y1="170" x2="110" y2="170" stroke="#838383" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="178" y="163" text-anchor="middle" font-size="10" fill="#838383">risposta</text>

  <!-- ========== BOTTOM: Mondo Esterno ========== -->
  <g id="external">
    <!-- Arrow from harness down -->
    <line x1="440" y1="264" x2="440" y2="290" stroke="#1ab197" stroke-width="1.3" marker-end="url(#arrow-teal)"/>

    <!-- External systems row -->
    <g transform="translate(370, 300)">
      <!-- Database icon -->
      <g transform="translate(0, 0)">
        <ellipse cx="12" cy="4" rx="12" ry="4" fill="none" stroke="#1ab197" stroke-width="1.2"/>
        <path d="M0,4 L0,20 C0,24 24,24 24,20 L24,4" fill="none" stroke="#1ab197" stroke-width="1.2"/>
        <text x="12" y="38" text-anchor="middle" font-size="8" fill="#1ab197">DB</text>
      </g>

      <!-- API icon -->
      <g transform="translate(58, 0)">
        <rect x="0" y="0" width="24" height="24" rx="3" fill="none" stroke="#1ab197" stroke-width="1.2"/>
        <text x="12" y="16" text-anchor="middle" font-size="7" font-weight="600" fill="#1ab197">API</text>
        <text x="12" y="38" text-anchor="middle" font-size="8" fill="#1ab197">API</text>
      </g>

      <!-- File icon -->
      <g transform="translate(116, 0)">
        <path d="M0,0 L16,0 L22,6 L22,24 L0,24z" fill="none" stroke="#1ab197" stroke-width="1.2"/>
        <path d="M16,0 L16,6 L22,6" fill="none" stroke="#1ab197" stroke-width="1.2"/>
        <text x="11" y="38" text-anchor="middle" font-size="8" fill="#1ab197">File</text>
      </g>
    </g>

    <!-- Label -->
    <text x="440" y="352" text-anchor="middle" font-size="11" font-weight="500" fill="#1ab197">mondo esterno</text>
  </g>
</svg>